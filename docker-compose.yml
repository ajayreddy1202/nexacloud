version: '3.8'
services:
  auth-service:
    build: ./services/auth-service
    ports:
      - "8000:8000"
    restart: always

  user-service:
    build: ./services/user-service
    ports:
      - "8001:8001"
    restart: always

  product-service:
    build: ./services/product-service
    ports:
      - "8002:8002"
    restart: always

  order-service:
    build: ./services/order-service
    ports:
      - "8003:8003"
    restart: always

  notification-service:
    build: ./services/notification-service
    ports:
      - "8004:8004"
    restart: always

  payment-service:
    build: ./services/payment-service
    ports:
      - "8005:8005"
    restart: always

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    restart: always

  node-exporter:
    image: prom/node-exporter
    ports:
      - "9100:9100"
    restart: always
