name: NexaCloud CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd services/auth-service
          pip install -r requirements.txt

      - name: Run migrations
        run: |
          cd services/auth-service
          python manage.py migrate

      - name: Verify all service Dockerfiles exist
        run: |
          for service in auth-service user-service product-service order-service notification-service payment-service; do
            echo "Checking $service..."
            ls services/$service/Dockerfile
          done

      - name: Build Docker images
        run: |
          docker compose build

      - name: Start containers
        run: |
          docker compose up -d
          sleep 15
          docker ps

      - name: Test auth service health
        run: |
          curl -f http://localhost:8000/api/auth/register/ || true

      - name: Stop containers
        run: |
          docker compose down
